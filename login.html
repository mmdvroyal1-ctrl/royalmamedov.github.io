<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Login</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{
  background:#020617;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:300px;
}

input{
  display:block;
  margin:10px auto;
  padding:10px;
  width:100%;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:white;
  margin-top:10px;
  width:100%;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

#msg{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>
<body>

<div class="card">
<h2>🔐 Login / Register</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<script>

// 🔥 SƏNİN FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAdERxfMTkvmMsPzzNy69D4q5SSZMn9HjQ",
  authDomain: "codelab-1414f.firebaseapp.com",
  projectId: "codelab-1414f",
  storageBucket: "codelab-1414f.firebasestorage.app",
  messagingSenderId: "842056693862",
  appId: "1:842056693862:web:52f692bbe29516331195a7",
  measurementId: "G-817PM4749Y"
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();


// REGISTER
function register(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email,pass)
  .then(()=>{
    document.getElementById("msg").innerText="Qeydiyyat uğurlu ✅";
  })
  .catch(e=>{
    document.getElementById("msg").innerText=e.message;
  });
}


// LOGIN (FIX OLUNMUŞ)
function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,pass)
  .then(()=>{
    document.getElementById("msg").innerText="Giriş uğurlu 🚀";

    // 🔥 USER HAZIR OLANDA KEÇİR
    auth.onAuthStateChanged(user=>{
      if(user){
        window.location.href="index.html";
      }
    });

  })
  .catch(e=>{
    document.getElementById("msg").innerText=e.message;
  });
}

</script>

</body>
</html>
