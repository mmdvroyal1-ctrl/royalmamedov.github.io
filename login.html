<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{background:#020617;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:#1e293b;padding:30px;border-radius:20px;text-align:center;}
input{display:block;margin:10px auto;padding:10px;border-radius:10px;border:none;}
button{padding:10px;background:#22c55e;border:none;color:white;border-radius:10px;}
</style>
</head>
<body>

<div class="box">
<h2>👑 Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Daxil ol</button>
<br><br>
<a href="register.html">Qeydiyyat</a>
</div>

<script>
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  let su=localStorage.getItem("user");
  let sp=localStorage.getItem("pass");

  if(u===su && p===sp){
    localStorage.setItem("login","true");
    window.location="index.html";
  }else{
    alert("Yanlış məlumat!");
  }
}
</script>

</body>
</html>
