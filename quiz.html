<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Quiz Seç</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

h1{
  color:#22c55e;
}

.btn{
  display:inline-block;
  padding:15px 25px;
  margin:10px;
  border-radius:12px;
  background:white;
  color:black;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-top:15px;
  text-align:left;
}

label{
  display:block;
  padding:5px;
  cursor:pointer;
}

button{
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:white;
  margin-top:10px;
}
</style>
</head>
<body>

<h1>🎓 Quiz Seç</h1>

<div id="menu">
  <div class="btn" onclick="basla('html')">HTML</div>
  <div class="btn" onclick="basla('css')">CSS</div>
  <div class="btn" onclick="basla('js')">JS</div>
  <div class="btn" onclick="basla('cpp')">C++</div>
  <div class="btn" onclick="basla('python')">Python</div>
</div>

<div id="quiz"></div>

<script>

let suallar = {

html:[
{q:"HTML nədir?",a:["Markup dili","Proqram dili"],d:0},
{q:"<h1> nədir?",a:["Başlıq","Şəkil"],d:0}
],

css:[
{q:"CSS nədir?",a:["Stil dili","Proqram dili"],d:0},
{q:"color nə edir?",a:["Rəng","Şəkil"],d:0}
],

js:[
{q:"JS nədir?",a:["Proqram dili","Stil"],d:0},
{q:"alert nə edir?",a:["Mesaj","Silir"],d:0}
],

cpp:[
{q:"C++ nədir?",a:["Proqram dili","HTML"],d:0},
{q:"cout nə edir?",a:["Çap","Silir"],d:0}
],

python:[
{q:"Python nədir?",a:["Proqram dili","HTML"],d:0},
{q:"print nə edir?",a:["Çap","Silir"],d:0}
]

};

function basla(fenn){

  let container = document.getElementById("quiz");
  container.innerHTML = "";

  let data = suallar[fenn];

  for(let i=0;i<data.length;i++){

    let s = data[i];

    let div = document.createElement("div");
    div.className="card";

    let q = document.createElement("h3");
    q.innerText = (i+1)+". "+s.q;

    div.appendChild(q);

    for(let j=0;j<s.a.length;j++){
      let label = document.createElement("label");

      let input = document.createElement("input");
      input.type="radio";
      input.name="s"+i;
      input.value=j;

      label.appendChild(input);
      label.append(" "+s.a[j]);

      div.appendChild(label);
    }

    container.appendChild(div);
  }

  let btn = document.createElement("button");
  btn.innerText="Yoxla";
  btn.onclick=function(){ yoxla(fenn); };

  container.appendChild(btn);

  let result = document.createElement("h2");
  result.id="netice";

  container.appendChild(result);
}

function yoxla(fenn){

  let bal=0;
  let data = suallar[fenn];

  for(let i=0;i<data.length;i++){

    let sec = document.querySelector('input[name="s'+i+'"]:checked');

    if(sec && sec.value == data[i].d){
      bal++;
    }
  }

  document.getElementById("netice").innerText="Bal: "+bal;
}

</script>

</body>
</html>
