<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Quiz Seç</title>

<style>
body{
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

h1{
  color:#22c55e;
  text-shadow:0 0 20px #22c55e;
}

.btn{
  display:inline-block;
  padding:15px 25px;
  margin:10px;
  border-radius:12px;
  background:white;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-top:15px;
  text-align:left;
}

/* 🔥 FIX */
label{
  display:block;
  padding:8px;
  cursor:pointer;
}

input{
  margin-right:10px;
  cursor:pointer;
}

button{
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:white;
  margin-top:10px;
}

a{
  color:white;
  display:block;
  margin-top:20px;
}
</style>
</head>
<body>

<h1>🎓 Quiz Seç</h1>

<div id="menu">
  <div class="btn" onclick="basla('html')">HTML</div>
  <div class="btn" onclick="basla('css')">CSS</div>
  <div class="btn" onclick="basla('js')">JS</div>
  <div class="btn" onclick="basla('cpp')">C++</div>
  <div class="btn" onclick="basla('python')">Python</div>
</div>

<div id="quiz"></div>

<a href="index.html">⬅ Geri</a>

<script>

let suallar = {
html:[{q:"HTML nədir?",a:["Markup dili","Proqram dili"],d:0}],
css:[{q:"CSS nədir?",a:["Stil dili","Proqram dili"],d:0}],
js:[{q:"JS nədir?",a:["Proqram dili","Stil"],d:0}],
cpp:[{q:"C++ nədir?",a:["Proqram dili","HTML"],d:0}],
python:[{q:"Python nədir?",a:["Proqram dili","HTML"],d:0}]
};

function basla(fenn){
  let html="";

  suallar[fenn].forEach(function(s,i){
    html += '<div class="card">';
    html += '<h3>'+(i+1)+'. '+s.q+'</h3>';

    s.a.forEach(function(c,j){
      html += '<label>';
      html += '<input type="radio" name="s'+i+'" value="'+j+'"> '+c;
      html += '</label>';
    });

    html += '</div>';
  });

  html += '<button onclick="yoxla(\''+fenn+'\')">Yoxla</button>';
  html += '<h2 id="netice"></h2>';

  document.getElementById("quiz").innerHTML = html;
}

function yoxla(fenn){
  let bal=0;

  suallar[fenn].forEach(function(s,i){
    let sec = document.querySelector('input[name="s'+i+'"]:checked');
    if(sec && sec.value == s.d){
      bal++;
    }
  });

  document.getElementById("netice").innerText = "Bal: "+bal;
}

</script>

</body>
</html>
