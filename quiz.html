<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:Arial;
  padding:20px;
}
button{
  padding:10px;
  margin:5px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
}
</style>

</head>
<body>

<h1>🎓 Quiz</h1>

<h3>HTML nədir?</h3>

<button onclick="checkAnswer(1)">Program dili</button>
<button onclick="checkAnswer(2)">Markup dili</button>

<p id="result"></p>

<br>
<a href="index.html">⬅ Geri</a>

<script>
function checkAnswer(answer){
  let result = document.getElementById("result");

  if(answer === 2){
    result.innerText = "Doğru ✅";
  }else{
    result.innerText = "Yanlış ❌";
  }
}
</script>

</body>
