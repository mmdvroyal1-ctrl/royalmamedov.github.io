<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Code Runner</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  text-align:center;
}

.menu button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#22c55e;
  color:white;
}

iframe{
  width:100%;
  height:90vh;
  border:none;
}
</style>

</head>
<body>

<h1>💻 Code Runner</h1>

<div class="menu">
<button onclick="load('web')">🌐 HTML/CSS/JS</button>
<button onclick="load('python')">🐍 Python</button>
<button onclick="load('cpp')">⚙️ C++</button>
</div>

<iframe id="frame"></iframe>

<script>
function load(type){
  let frame = document.getElementById("frame");

  if(type==="web"){
    frame.src = "https://onecompiler.com/html";
  }

  if(type==="python"){
    frame.src = "https://onecompiler.com/python";
  }

  if(type==="cpp"){
    frame.src = "https://onecompiler.com/cpp";
  }
}
</script>

</body>
</html>
