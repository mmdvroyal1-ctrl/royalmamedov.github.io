<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Code Runner</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  text-align:center;
}

/* BACK BUTTON */
.back{
  position:absolute;
  top:10px;
  left:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

h1{
  margin:10px;
}

/* MENU */
.menu button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#22c55e;
  color:white;
  transition:0.2s;
}

.menu button:hover{
  background:#16a34a;
}

/* FRAME */
iframe{
  width:100%;
  height:85vh;
  border:none;
}
</style>

</head>
<body>

<!-- BACK -->
<button class="back" onclick="goBack()">⬅️ Geri qayıt</button>

<h1>💻 Code Runner</h1>

<div class="menu">
<button onclick="load('html')">🌐 HTML</button>
<button onclick="load('css')">🎨 CSS</button>
<button onclick="load('js')">⚡ JavaScript</button>
<button onclick="load('python')">🐍 Python</button>
<button onclick="load('cpp')">⚙️ C++</button>
</div>

<iframe id="frame" src="https://onecompiler.com/html"></iframe>

<script>

/* BACK */
function goBack(){
  if(history.length > 1){
    history.back();
  }else{
    window.location.href="index.html";
  }
}

/* LOAD LANG */
function load(type){
  let frame = document.getElementById("frame");

  if(type==="html"){
    frame.src="https://onecompiler.com/html";
  }

  if(type==="css"){
    frame.src="https://onecompiler.com/html"; // CSS HTML içində işləyir
  }

  if(type==="js"){
    frame.src="https://onecompiler.com/javascript";
  }

  if(type==="python"){
    frame.src="https://onecompiler.com/python";
  }

  if(type==="cpp"){
    frame.src="https://onecompiler.com/cpp";
  }
}

</script>

</body>
</html>
