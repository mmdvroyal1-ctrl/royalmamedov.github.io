<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>CodeLab PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  display:flex;
  height:100vh;
  background:radial-gradient(circle at top left,#020617,#0f172a,#020617);
  color:white;
  overflow:hidden;
}

/* BACKGROUND GLOW */
body::before, body::after{
  content:"";
  position:fixed;
  width:400px;height:400px;
  filter:blur(180px);
  opacity:.3;
  pointer-events:none;
}

body::before{
  background:#22c55e;
  top:-100px;left:-100px;
}

body::after{
  background:#0ea5e9;
  bottom:-100px;right:-100px;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  padding:20px;
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.05);
  border-right:1px solid rgba(255,255,255,0.1);
}

.logo{
  font-size:24px;
  font-weight:700;
  color:#22c55e;
}

.sub{
  font-size:12px;
  opacity:0.5;
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.sidebar a:hover{
  background:rgba(34,197,94,0.2);
  transform:translateX(6px);
}

/* CONTENT */
.content{
  flex:1;
  padding:30px;
  overflow:auto;
}

/* TITLE */
.glow{
  color:#22c55e;
  text-shadow:0 0 15px #22c55e;
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.logout{
  background:#ef4444;
  color:white;
}

.logout:hover{
  transform:scale(1.05);
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:20px;
  border-radius:20px;
  margin-top:20px;
  border:1px solid rgba(255,255,255,0.1);
  animation:fade 0.8s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* CHAT */
.chat{
  height:260px;
  overflow:auto;
  background:rgba(0,0,0,0.4);
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.user{
  color:#4ade80;
  margin:5px 0;
}

.bot{
  color:white;
  margin:5px 0;
}

/* INPUT */
input{
  width:70%;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* RUNNER */
iframe{
  width:100%;
  height:200px;
  background:white;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">💻 CodeLab</div>
<div class="sub">by Royal Mamedov</div>

<a href="html.html">📄 HTML</a>
<a href="css.html">🎨 CSS</a>
<a href="js.html">⚡ JavaScript</a>
<a href="cpp.html">⚙️ C++</a>
<a href="python.html">🐍 Python</a>
<a href="runner.html">💻 Runner</a>
<a href="profile.html">👤 Profil</a>
<a href="quiz.html">🎓 Quiz</a>
</div>

<div class="content">

<h1 class="glow">Salam, <span id="name"></span> 👋</h1>
<button class="logout" onclick="logout()">Logout</button>

<div class="card">
<h2>🚀 Xoş gəldin</h2>
<p>Platformaya uğurla daxil oldun</p>
</div>

<div class="card">
<h2>🤖 CodeLab AI PRO</h2>

<div id="chat" class="chat"></div>

<input id="aiInput" placeholder="Sual ver...">
<button onclick="askAI()">Göndər</button>

<iframe id="output"></iframe>

</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAdERxfMTkvmMsPzzNy69D4q5SSZMn9HjQ",
  authDomain: "codelab-1414f.firebaseapp.com",
  projectId: "codelab-1414f"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let username="";

// LOGIN
setTimeout(()=>{
  let user=auth.currentUser;
  if(user){
    username=user.email;
    document.getElementById("name").innerText=username;
  }else{
    window.location="login.html";
  }
},500);

// LOGOUT
function logout(){
  auth.signOut().then(()=>window.location="login.html");
}

// ENTER
document.getElementById("aiInput").addEventListener("keypress",e=>{
  if(e.key==="Enter") askAI();
});

// RUN CODE
function runCode(code){
  document.getElementById("output").srcdoc=code;
}

// AI (NO MEMORY ❌)
function askAI(){
  let input=document.getElementById("aiInput");
  let chat=document.getElementById("chat");

  let msg=input.value.trim();
  if(msg==="") return;

  let lower=msg.toLowerCase();

  chat.innerHTML+=`<div class="user">🧑: ${msg}</div>`;

  let reply="";
  let code="";

  if(/salam|hello|hi/.test(lower)){
    reply="Salam "+username+" 👋";
  }
  else if(lower.includes("necəsən")){
    reply="Yaxşıyam 😎 sən?";
  }
  else if(lower.includes("button")){
    code="<button style='padding:10px;background:green;color:white'>Klik</button>";
    reply="Button hazırdır 👇";
  }
  else if(lower.includes("input")){
    code="<input placeholder='Yaz...' style='padding:10px'>";
    reply="Input hazırdır 👇";
  }
  else if(lower.includes("html")){
    code="<h2 style='color:red'>HTML işləyir</h2>";
    reply="HTML nümunə 👇";
  }
  else if(lower.includes("css")){
    code="<h2 style='color:blue'>CSS işləyir</h2>";
    reply="CSS nümunə 👇";
  }
  else{
    reply="Daha konkret yaz 👍";
  }

  setTimeout(()=>{
    chat.innerHTML+=`<div class="bot">🤖: ${reply}</div>`;
    if(code) runCode(code);
    chat.scrollTop=chat.scrollHeight;
  },300);

  input.value="";
}
</script>

</body>
</html>
