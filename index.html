<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>CodeLab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#020617,#0f172a,#020617);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  padding:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  border-right:1px solid rgba(255,255,255,0.1);
}

.logo{
  font-size:22px;
  font-weight:700;
  color:#22c55e;
  margin-bottom:5px;
}

.sub{
  font-size:12px;
  opacity:0.5;
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.sidebar a:hover{
  background:rgba(34,197,94,0.2);
  transform:translateX(5px);
}

/* CONTENT */
.content{
  flex:1;
  padding:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.1);
}

button{
  padding:10px 15px;
  border:none;
  border-radius:12px;
  margin:5px;
  cursor:pointer;
  font-weight:bold;
  background:#22c55e;
}

.logout{
  background:#ef4444;
}

.glow{
  color:#22c55e;
  text-shadow:0 0 10px #22c55e;
}

input{
  width:70%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

/* CHAT */
.chat{
  height:200px;
  overflow:auto;
  background:rgba(0,0,0,0.3);
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.user{color:#4ade80;}
.bot{color:#fff;}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">💻 CodeLab</div>
<div class="sub">by Royal Mamedov</div>

<a href="html.html">📄 HTML</a>
<a href="css.html">🎨 CSS</a>
<a href="js.html">⚡ JavaScript</a>
<a href="cpp.html">⚙️ C++</a>
<a href="python.html">🐍 Python</a>
<a href="runner.html">💻 Runner</a>
<a href="profile.html">👤 Profil</a>
<a href="quiz.html">🎓 Quiz</a>
</div>

<!-- CONTENT -->
<div class="content">

<h1 class="glow">Salam, <span id="name"></span> 👋</h1>
<button class="logout" onclick="logout()">Logout</button>

<div class="card">
<h2>🚀 Xoş gəldin</h2>
<p>Platformaya uğurla daxil oldun</p>
</div>

<div class="card">
<h2>💡 Nə edə bilərsən?</h2>
<ul>
<li>📘 Dərsləri oxu</li>
<li>💻 Kod yaz və test et</li>
<li>🎓 Quiz həll et</li>
<li>👤 Profilini idarə et</li>
</ul>
</div>

<!-- 🤖 AI -->
<div class="card">
<h2>🤖 AI Köməkçi</h2>

<div id="chat" class="chat"></div>

<input id="aiInput" placeholder="Sual ver...">
<button onclick="askAI()">Göndər</button>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAdERxfMTkvmMsPzzNy69D4q5SSZMn9HjQ",
  authDomain: "codelab-1414f.firebaseapp.com",
  projectId: "codelab-1414f"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN CHECK
setTimeout(()=>{
  let user = auth.currentUser;

  if(user){
    document.getElementById("name").innerText = user.email;
  }else{
    window.location.href="login.html";
  }
},500);

// LOGOUT
function logout(){
  auth.signOut().then(()=>{
    window.location.href="login.html";
  });
}

// 🤖 AI CHAT
function askAI(){
  let input = document.getElementById("aiInput");
  let chat = document.getElementById("chat");
  let msg = input.value.toLowerCase();

  if(msg==="") return;

  chat.innerHTML += `<div class="user">🧑: ${msg}</div>`;

  let reply = "";

  if(msg.includes("salam") || msg.includes("hello")){
    reply = "Salam 👋 Mən CodeLab AI-yam";
  }
  else if(msg.includes("necəsən")){
    reply = "Yaxşıyam 😎 sən necəsən?";
  }
  else if(msg.includes("codelab")){
    reply = "CodeLab proqramlaşdırma öyrənmək üçün platformadır 💻";
  }
  else if(msg.includes("quiz")){
    reply = "Quiz bölməsində 5 dil üzrə suallar var 🎓";
  }
  else if(msg.includes("runner")){
    reply = "Runner bölməsində kod yazıb test edə bilərsən 💻";
  }
  else if(msg.includes("html")){
    reply = "HTML saytın strukturudur 🧱 məsələn: <h1>Salam</h1>";
  }
  else if(msg.includes("css")){
    reply = "CSS dizayn üçündür 🎨";
  }
  else if(msg.includes("js") || msg.includes("javascript")){
    reply = "JavaScript saytın beynidir ⚡";
  }
  else if(msg.includes("python")){
    reply = "Python sadə və güclü dildir 🐍";
  }
  else if(msg.includes("c++")){
    reply = "C++ çox sürətli proqramlaşdırma dilidir ⚙️";
  }
  else{
    reply = "Başa düşmədim 🤔 başqa cür yaz";
  }

  setTimeout(()=>{
    chat.innerHTML += `<div class="bot">🤖: ${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  },500);

  input.value="";
}
</script>

</body>
</html>
