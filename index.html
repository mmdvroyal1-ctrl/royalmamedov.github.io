<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>Kodlama Öyrən</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }
    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #334155;
      padding: 10px;
    }
    nav a {
      color: white;
      text-decoration: none;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    button {
      background: #22c55e;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>💻 Kodlama Öyrən</header>

<nav>
  <a href="#">HTML</a>
  <a href="#">CSS</a>
  <a href="#">JavaScript</a>
</nav>

<div class="container">

  <div class="card">
    <h2>HTML nədir?</h2>
    <p>HTML veb saytların skeletidir.</p>
    <button onclick="alert('HTML öyrənməyə başladın!')">Başla</button>
  </div>

  <div class="card">
    <h2>CSS nədir?</h2>
    <p>CSS saytın görünüşünü dəyişir.</p>
    <button onclick="alert('CSS öyrənməyə başladın!')">Başla</button>
  </div>

  <div class="card">
    <h2>JavaScript nədir?</h2>
    <p>JavaScript saytları interaktiv edir.</p>
    <button onclick="alert('JS öyrənməyə başladın!')">Başla</button>
  </div>

</div>

</body>
</html>
