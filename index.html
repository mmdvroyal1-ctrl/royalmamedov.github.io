<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Royal Platform</title>

<script>
// Login yoxdursa login səhifəsinə at
if(localStorage.getItem("login")!=="true"){
  window.location="login.html";
}

// Logout funksiyası
function logout(){
  localStorage.removeItem("login");
  window.location="login.html";
}
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  background:#020617;
  color:white;
}

.sidebar{
  width:230px;
  height:100vh;
  background:#020617;
  padding:20px;
}

.sidebar a{
  display:block;
  padding:10px;
  color:white;
  text-decoration:none;
  margin:10px 0;
  border-radius:10px;
}

.sidebar a:hover{
  background:#1e293b;
}

.content{
  flex:1;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

button{
  padding:10px;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>

</head>
<body>

<div class="sidebar">
<h2>👑 Royal</h2>
<a href="html.html">📄 HTML</a>
<a href="css.html">🎨 CSS</a>
<a href="js.html">⚡ JavaScript</a>
<a href="runner.html">💻 Runner</a>
</div>

<div class="content">

<h1>Salam, <span id="name"></span> 👋</h1>

<button onclick="logout()">Logout</button>

<div class="card">
Platformaya xoş gəldin!
</div>

<div class="card">
Burada sən HTML, CSS və JavaScript öyrənə bilərsən.
</div>

</div>

<script>
// USER ADINI GÖSTƏRİR
let user = localStorage.getItem("user") || "Qonaq";
document.getElementById("name").innerText = user;
</script>

</body>
</html>
