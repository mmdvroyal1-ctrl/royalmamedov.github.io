<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>CodeLab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#020617,#0f172a,#020617);
  color:white;
}

.sidebar{
  width:250px;
  padding:20px;
  background:rgba(255,255,255,0.05);
}

.logo{font-size:22px;color:#22c55e;}
.sub{font-size:12px;opacity:0.5;margin-bottom:20px;}

.sidebar a{
  display:block;
  padding:10px;
  margin:10px 0;
  color:white;
  text-decoration:none;
}

.content{flex:1;padding:30px;}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
  background:#22c55e;
  color:white;
}

.logout{background:red;}
.glow{color:#22c55e;}

input{
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">💻 CodeLab</div>
<div class="sub">by Royal Mamedov</div>

<a href="html.html">HTML</a>
<a href="css.html">CSS</a>
<a href="js.html">JS</a>
<a href="cpp.html">C++</a>
<a href="python.html">Python</a>
<a href="quiz.html">Quiz</a>
</div>

<div class="content">

<h1 class="glow">Salam, <span id="name"></span> 👋</h1>

<button class="logout" onclick="logout()">Logout</button>

<div class="card">
<h2>🚀 Xoş gəldin</h2>
<p>Platformaya uğurla daxil oldun</p>
</div>

<!-- 🤖 AI SECTION -->
<div class="card">
<h2>🤖 AI Köməkçi</h2>

<input id="aiInput" placeholder="Sual ver..." style="width:100%;margin-top:10px;">
<button onclick="askAI()">Soruş</button>

<div id="aiResponse" style="margin-top:10px;"></div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAdERxfMTkvmMsPzzNy69D4q5SSZMn9HjQ",
  authDomain: "codelab-1414f.firebaseapp.com",
  projectId: "codelab-1414f"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN CHECK
setTimeout(()=>{
  let user = auth.currentUser;

  if(user){
    document.getElementById("name").innerText = user.email;
  }else{
    window.location.href="login.html";
  }
},500);

// LOGOUT
function logout(){
  auth.signOut().then(()=>{
    window.location.href="login.html";
  });
}

// 🤖 FAKE AI (PULSUZ)
function askAI(){
  let q = document.getElementById("aiInput").value.toLowerCase();
  let res = document.getElementById("aiResponse");

  if(q.includes("html")){
    res.innerText="HTML saytın skeletidir 🧱";
  }
  else if(q.includes("css")){
    res.innerText="CSS dizayn üçündür 🎨";
  }
  else if(q.includes("javascript") || q.includes("js")){
    res.innerText="JavaScript saytı canlandırır ⚡";
  }
  else if(q.includes("python")){
    res.innerText="Python sadə və güclü dildir 🐍";
  }
  else if(q.includes("c++")){
    res.innerText="C++ sürətli və güclü proqramlaşdırma dilidir ⚙️";
  }
  else{
    res.innerText="Bunu hələ bilmirəm 😅 amma tezliklə öyrənəcəm!";
  }
}
</script>

</body>
</html>
