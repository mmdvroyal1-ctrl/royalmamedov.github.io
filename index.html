<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>CodeLab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#020617,#0f172a,#020617);
  color:white;
}

.sidebar{
  width:250px;
  padding:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  border-right:1px solid rgba(255,255,255,0.1);
}

.logo{font-size:22px;font-weight:700;color:#22c55e;}
.sub{font-size:12px;opacity:0.5;margin-bottom:20px;}

.sidebar a{
  display:block;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.sidebar a:hover{
  background:rgba(34,197,94,0.2);
  transform:translateX(5px);
}

.content{flex:1;padding:30px;}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  background:#22c55e;
}

.logout{background:#ef4444;}

.glow{
  color:#22c55e;
  text-shadow:0 0 10px #22c55e;
}

.chat{
  height:260px;
  overflow:auto;
  background:rgba(0,0,0,0.3);
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.user{color:#4ade80;}
.bot{color:white;}

input{
  width:70%;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* RUNNER */
iframe{
  width:100%;
  height:200px;
  background:white;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">💻 CodeLab</div>
<div class="sub">by Royal Mamedov</div>

<a href="html.html">📄 HTML</a>
<a href="css.html">🎨 CSS</a>
<a href="js.html">⚡ JavaScript</a>
<a href="cpp.html">⚙️ C++</a>
<a href="python.html">🐍 Python</a>
<a href="runner.html">💻 Runner</a>
<a href="profile.html">👤 Profil</a>
<a href="quiz.html">🎓 Quiz</a>
</div>

<div class="content">

<h1 class="glow">Salam, <span id="name"></span> 👋</h1>
<button class="logout" onclick="logout()">Logout</button>

<div class="card">
<h2>🚀 Xoş gəldin</h2>
<p>Platformaya uğurla daxil oldun</p>
</div>

<div class="card">
<h2>🤖 CodeLab PRO AI</h2>

<div id="chat" class="chat"></div>

<input id="aiInput" placeholder="Sual ver...">
<button onclick="askAI()">Göndər</button>

<iframe id="output"></iframe>

</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAdERxfMTkvmMsPzzNy69D4q5SSZMn9HjQ",
  authDomain: "codelab-1414f.firebaseapp.com",
  projectId: "codelab-1414f"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let username="";
let memory=JSON.parse(localStorage.getItem("chatMemory"))||[];

// LOGIN
setTimeout(()=>{
  let user=auth.currentUser;
  if(user){
    username=user.email;
    document.getElementById("name").innerText=username;
  }else{
    window.location="login.html";
  }
},500);

// LOGOUT
function logout(){
  auth.signOut().then(()=>window.location="login.html");
}

// ENTER
document.getElementById("aiInput").addEventListener("keypress",e=>{
  if(e.key==="Enter") askAI();
});

// LOAD CHAT
window.onload=()=>{
  let chat=document.getElementById("chat");
  memory.forEach(m=>chat.innerHTML+=m);
};

// RUN CODE
function runCode(code){
  document.getElementById("output").srcdoc=code;
}

// AI
function askAI(){
  let input=document.getElementById("aiInput");
  let chat=document.getElementById("chat");

  let msg=input.value.trim();
  if(msg==="") return;

  let lower=msg.toLowerCase();

  let userMsg=`<div class="user">🧑: ${msg}</div>`;
  chat.innerHTML+=userMsg;
  memory.push(userMsg);

  let reply="";
  let code="";

  // CHAT
  if(/salam|hello|hi/.test(lower)){
    reply="Salam "+username+" 👋 Necəsən?";
  }

  else if(lower.includes("necəsən")){
    reply="Əlayam 😎 sən necəsən?";
  }

  // CODE GENERATION
  else if(lower.includes("button")){
    code="<button style='padding:10px;background:green;color:white'>Klik</button>";
    reply="Button hazırdır 👇";
  }

  else if(lower.includes("input")){
    code="<input placeholder='Yaz...' style='padding:10px'>";
    reply="Input hazırdır 👇";
  }

  else if(lower.includes("sayt qur")){
    code="<h1 style='color:red'>Salam Dünya</h1>";
    reply="Mini sayt quruldu 👇";
  }

  else if(lower.includes("html")){
    code="<h2>HTML işləyir</h2>";
    reply="HTML nümunə 👇";
  }

  else if(lower.includes("css")){
    code="<h1 style='color:blue'>CSS işləyir</h1>";
    reply="CSS tətbiq edildi 👇";
  }

  // DEBUG
  else if(lower.includes("səhv")){
    reply="Kodu göndər, analiz edib düzəldim 🔧";
  }

  // MEMORY
  else if(lower.includes("ne demişdim")){
    reply=memory.length>2?memory[memory.length-2]:"Yadda heç nə yoxdur";
  }

  else{
    reply="Daha konkret yaz 👍 məsələn: 'button yarat'";
  }

  let botMsg=`<div class="bot">🤖: ${reply}</div>`;

  setTimeout(()=>{
    chat.innerHTML+=botMsg;
    memory.push(botMsg);

    if(code){
      runCode(code);
    }

    localStorage.setItem("chatMemory",JSON.stringify(memory));
    chat.scrollTop=chat.scrollHeight;
  },300);

  input.value="";
}
</script>

</body>
</html>
