<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Royal Platform</title>

<script>
// Login yoxdursa loginə at
if(localStorage.getItem("login")!=="true"){
  window.location="login.html";
}

// Logout
function logout(){
  localStorage.removeItem("login");
  window.location="login.html";
}

// Dark mode toggle
function toggleMode(){
  let mode = localStorage.getItem("mode");

  if(mode==="light"){
    document.body.style.background="#020617";
    document.body.style.color="white";
    localStorage.setItem("mode","dark");
  }else{
    document.body.style.background="white";
    document.body.style.color="black";
    localStorage.setItem("mode","light");
  }
}

// Səhifə açılarkən mode tətbiq et
window.onload=function(){
  let mode = localStorage.getItem("mode");
  if(mode==="light"){
    document.body.style.background="white";
    document.body.style.color="black";
  }
}
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  background:#020617;
  color:white;
}

.sidebar{
  width:240px;
  height:100vh;
  background:#020617;
  padding:20px;
}

.sidebar h2{
  color:#22c55e;
}

.sidebar a{
  display:block;
  padding:10px;
  color:white;
  text-decoration:none;
  margin:10px 0;
  border-radius:10px;
}

.sidebar a:hover{
  background:#1e293b;
}

.content{
  flex:1;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.logout{background:red;color:white;}
.mode{background:#22c55e;color:white;}
</style>

</head>
<body>

<div class="sidebar">
<h2>👑 Royal</h2>

<a href="html.html">📄 HTML</a>
<a href="css.html">🎨 CSS</a>
<a href="js.html">⚡ JavaScript</a>
<a href="runner.html">💻 Runner</a>
<a href="profile.html">👤 Profil</a>
<a href="quiz.html">🎓 Quiz</a>

</div>

<div class="content">

<h1>Salam, <span id="name"></span> 👋</h1>

<button class="logout" onclick="logout()">Logout</button>
<button class="mode" onclick="toggleMode()">🌙 Mode</button>

<div class="card">
Platformaya xoş gəldin!
</div>

<div class="card">
Bu platformada HTML, CSS və JavaScript öyrənə bilərsən.
</div>

</div>

<script>
// User adını göstər
let user = localStorage.getItem("user") || "Qonaq";
document.getElementById("name").innerText = user;
</script>

</body>
</html>
