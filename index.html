<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>CodeLab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#020617,#0f172a,#020617);
  color:white;
}

.sidebar{
  width:250px;
  padding:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  border-right:1px solid rgba(255,255,255,0.1);
}

.logo{
  font-size:22px;
  font-weight:700;
  color:#22c55e;
}

.sub{
  font-size:12px;
  opacity:0.5;
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  text-decoration:none;
  color:white;
}

.sidebar a:hover{
  background:rgba(34,197,94,0.2);
}

.content{
  flex:1;
  padding:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#22c55e;
}

.logout{background:#ef4444;}

.chat{
  height:250px;
  overflow:auto;
  background:rgba(0,0,0,0.3);
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.user{color:#4ade80;}
.bot{color:white;}

input{
  width:70%;
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">💻 CodeLab</div>
<div class="sub">by Royal Mamedov</div>

<a href="html.html">HTML</a>
<a href="css.html">CSS</a>
<a href="js.html">JS</a>
<a href="cpp.html">C++</a>
<a href="python.html">Python</a>
<a href="runner.html">Runner</a>
<a href="profile.html">Profil</a>
<a href="quiz.html">Quiz</a>
</div>

<div class="content">

<h1>Salam, <span id="name"></span> 👋</h1>
<button class="logout" onclick="logout()">Logout</button>

<div class="card">
<h2>🚀 Xoş gəldin</h2>
<p>Platformaya uğurla daxil oldun</p>
</div>

<div class="card">
<h2>🤖 AI Köməkçi</h2>

<div id="chat" class="chat"></div>

<input id="aiInput" placeholder="Sual ver...">
<button onclick="askAI()">Göndər</button>

</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAdERxfMTkvmMsPzzNy69D4q5SSZMn9HjQ",
  authDomain: "codelab-1414f.firebaseapp.com",
  projectId: "codelab-1414f"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let username = "";

// LOGIN CHECK
setTimeout(()=>{
  let user = auth.currentUser;
  if(user){
    username = user.email;
    document.getElementById("name").innerText = username;
  }else{
    window.location="login.html";
  }
},500);

// LOGOUT
function logout(){
  auth.signOut().then(()=> window.location="login.html");
}

// ENTER basanda göndər
document.getElementById("aiInput").addEventListener("keypress",function(e){
  if(e.key==="Enter") askAI();
});

// AI
function askAI(){
  let input = document.getElementById("aiInput");
  let chat = document.getElementById("chat");
  let msg = input.value.trim().toLowerCase();

  if(msg==="") return;

  chat.innerHTML += `<div class="user">🧑: ${msg}</div>`;

  let reply = "";

  // CHAT
  if(msg.includes("salam") || msg.includes("hello") || msg.includes("hi")){
    reply = "Salam " + username + " 👋 Necəsən?";
  }
  else if(msg.includes("necəsən")){
    reply = "Yaxşıyam 😎 sən necəsən?";
  }
  else if(msg.includes("kimsen")){
    reply = "Mən CodeLab AI-yam 🤖 sənə proqramlaşdırmada kömək edirəm";
  }

  // SAYT
  else if(msg.includes("codelab")){
    reply = "CodeLab proqramlaşdırma öyrənmə platformasıdır 💻";
  }
  else if(msg.includes("quiz")){
    reply = "Quiz bölməsində testlər var 🎓";
  }
  else if(msg.includes("runner")){
    reply = "Runner kod yazmaq üçündür 💻";
  }

  // HTML
  else if(msg.includes("html")){
    reply = "HTML saytın skeletidir. Məsələn:\n<h1>Salam</h1>";
  }

  // CSS
  else if(msg.includes("css")){
    reply = "CSS dizayn üçündür.\nbody { color:red; }";
  }

  // JS
  else if(msg.includes("javascript") || msg.includes("js")){
    reply = "JavaScript interaktivlik yaradır.\nalert('Salam')";
  }

  // PYTHON
  else if(msg.includes("python")){
    reply = "Python sadə dildir:\nprint('Salam')";
  }

  // C++
  else if(msg.includes("c++")){
    reply = "C++ sürətli dildir:\ncout << 'Salam';";
  }

  // DEFAULT
  else{
    reply = "Başa düşmədim 🤔 başqa cür yaz";
  }

  setTimeout(()=>{
    chat.innerHTML += `<div class="bot">🤖: ${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  },300);

  input.value="";
}
</script>

</body>
</html>
