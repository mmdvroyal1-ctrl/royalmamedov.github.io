<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>HTML Ultimate - CodeLab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#020617,#020617,#0f172a);
  color:white;
  padding:20px;
  position:relative;
}

/* 🔥 FIX: overlay klik bloklamasın */
body::before,
body::after{
  content:"";
  position:fixed;
  width:300px;height:300px;
  filter:blur(150px);
  opacity:.2;
  pointer-events:none; /* ✅ ƏN VACİB FIX */
}

body::before{
  background:#22c55e;
  top:0;left:0;
}

body::after{
  background:#0ea5e9;
  bottom:0;right:0;
}

/* BACK BUTTON */
.back{
  padding:10px 15px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:20px;
  position:relative;
  z-index:10; /* ✅ Üstə çıxar */
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:20px;
  border-radius:20px;
  margin-bottom:15px;
  border:1px solid rgba(255,255,255,0.1);
}

/* TITLE */
h1{
  color:#22c55e;
  margin-bottom:15px;
}

/* ACCORDION */
.section{
  cursor:pointer;
  padding:15px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  margin-top:10px;
}

.content{
  display:none;
  margin-top:10px;
}

/* CODE */
pre{
  background:#000;
  padding:10px;
  border-radius:10px;
  color:#22c55e;
  overflow:auto;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:10px;
}

/* MEDIA */
iframe,img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<button class="back" onclick="goBack()">⬅️ Geri qayıt</button>

<div class="card">

<h1>🔥 HTML ULTIMATE</h1>

<div class="section" onclick="toggle(this)">📌 HTML nədir?</div>
<div class="content"><p>HTML saytın skeletidir.</p></div>

<div class="section" onclick="toggle(this)">📌 Struktur</div>
<div class="content">
<pre id="c1">&lt;h1&gt;Salam&lt;/h1&gt;</pre>
<button onclick="copy('c1')">Copy</button>
</div>

<div class="section" onclick="toggle(this)">📌 Video</div>
<div class="content">
<iframe src="https://www.youtube.com/embed/UB1O30fR-EE"></iframe>
</div>

<div class="section" onclick="toggle(this)">💻 Test</div>
<div class="content">
<textarea id="editor">&lt;h1&gt;Salam&lt;/h1&gt;</textarea>
<button onclick="run()">Run</button>
<iframe id="result"></iframe>
</div>

</div>

<script>

/* ✅ BACK FIX */
function goBack(){
  try{
    if(history.length > 1){
      history.back();
    }else{
      window.location.href="index.html";
    }
  }catch(e){
    window.location.href="index.html";
  }
}

/* ACCORDION */
function toggle(el){
  let c = el.nextElementSibling;
  c.style.display = c.style.display=="block"?"none":"block";
}

/* COPY */
function copy(id){
  navigator.clipboard.writeText(
    document.getElementById(id).innerText
  );
  alert("Kopyalandı!");
}

/* RUN */
function run(){
  document.getElementById("result").srcdoc =
    document.getElementById("editor").value;
}

</script>

</body>
</html>
