<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>CSS dərsi</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #0f172a, #1e3a8a);
  color: white;
  padding: 20px;
}

header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
  background: linear-gradient(to right, #22c55e, #3b82f6);
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

pre {
  background: black;
  color: lime;
  padding: 10px;
  border-radius: 10px;
}

a {
  color: #22c55e;
  text-decoration: none;
}

footer {
  text-align: center;
  margin-top: 30px;
  opacity: 0.7;
}
</style>

</head>
<body>

<header>👑 ROYAL MAMEDOV</header>

<div class="card">
<h1>CSS nədir?</h1>
<p>CSS (Cascading Style Sheets) saytın dizaynını yaradır.</p>
</div>

<div class="card">
<h2>Nəyə yarayır?</h2>
<ul>
<li>Rəng verir</li>
<li>Font dəyişir</li>
<li>Dizayn yaradır</li>
</ul>
</div>

<div class="card">
<h2>Nümunə kod</h2>
<pre>
body {
  background: black;
  color: white;
}
</pre>
</div>

<a href="index.html">⬅ Geri qayıt</a>

<footer>© 2026 Royal Mamedov</footer>

</body>
</html>
